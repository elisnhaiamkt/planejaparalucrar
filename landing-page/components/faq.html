<!-- components/faq.html
     Itens da lista vêm de assets/data/faq.json, montados por app.js -->
<section class="secao secao--bege" id="faq">
  <div class="container">
    <span class="eyebrow" data-bind="faq_secao.eyebrow"></span>
    <h2 class="titulo-secao" data-bind="faq_secao.titulo"></h2>

    <div class="lista-faq" id="lista-faq"></div>
  </div>
</section>

<!-- CTA FINAL -->
<section class="secao cta-final" id="cta-final">
  <div class="container">
    <div class="tarja" data-bind="cta_final.escassez"></div>
    <h2 class="cta-final__titulo" data-bind="cta_final.titulo"></h2>
    <p class="cta-final__sub" data-bind="cta_final.subtitulo"></p>

    <div class="bloco-contador js-contador-instancia" style="display:flex; flex-direction:column; align-items:center;">
      <p class="contador__frase"><strong data-bind="contador.frase"></strong></p>
      <div class="contador" role="timer" aria-label="Tempo restante para o fim das inscrições">
        <div class="contador__unidade">
          <span class="contador__numero" data-unidade="dias">00</span>
          <span class="contador__label" data-bind="contador.labels.dias"></span>
        </div>
        <div class="contador__unidade">
          <span class="contador__numero" data-unidade="horas">00</span>
          <span class="contador__label" data-bind="contador.labels.horas"></span>
        </div>
        <div class="contador__unidade">
          <span class="contador__numero" data-unidade="min">00</span>
          <span class="contador__label" data-bind="contador.labels.min"></span>
        </div>
        <div class="contador__unidade">
          <span class="contador__numero" data-unidade="seg">00</span>
          <span class="contador__label" data-bind="contador.labels.seg"></span>
        </div>
      </div>
      <p class="contador__frase-fecho" data-bind="contador.frase_fecho"></p>
    </div>

    <div class="grupo-cta">
      <a class="btn btn--primario btn--grande" data-cta="checkout-final"
         data-track="cta_checkout" href="#" data-bind="cta_final.cta_botao"></a>
      <a class="btn btn--secundario" data-cta="grupo-final"
         data-track="cta_grupo_whatsapp" href="#" data-bind="cta_final.cta_secundario"></a>
    </div>
    <p class="nota-cta" data-bind="cta_final.nota_cta"></p>
  </div>
</section>
