<!-- components/hero.html
     Preenchido por app.js a partir de assets/data/content.json (chave "hero") -->
<section class="hero secao--escura" id="hero">
  <div class="container hero__interno">
    <div class="hero__coluna-texto revelar revelar--ativo">
      <p class="hero__meta" data-bind="hero.meta_curta"></p>
      <div class="tarja" data-bind="hero.escassez"></div>

      <h1 class="hero__headline" data-bind="hero.headline"></h1>
      <p class="hero__sub" data-bind="hero.subheadline"></p>

      <div class="bloco-contador js-contador-instancia">
        <p class="contador__frase"><strong data-bind="contador.frase"></strong></p>
        <div class="contador" role="timer" aria-label="Tempo restante para o fim das inscrições">
          <div class="contador__unidade">
            <span class="contador__numero" data-unidade="dias">00</span>
            <span class="contador__label" data-bind="contador.labels.dias"></span>
          </div>
          <div class="contador__unidade">
            <span class="contador__numero" data-unidade="horas">00</span>
            <span class="contador__label" data-bind="contador.labels.horas"></span>
          </div>
          <div class="contador__unidade">
            <span class="contador__numero" data-unidade="min">00</span>
            <span class="contador__label" data-bind="contador.labels.min"></span>
          </div>
          <div class="contador__unidade">
            <span class="contador__numero" data-unidade="seg">00</span>
            <span class="contador__label" data-bind="contador.labels.seg"></span>
          </div>
        </div>
        <p class="contador__frase-fecho" data-bind="contador.frase_fecho"></p>
      </div>

      <div class="grupo-cta">
        <a class="btn btn--primario btn--grande"
           data-cta="checkout-hero" data-track="cta_checkout" href="#"
           data-bind="hero.cta_principal"></a>
      </div>
    </div>
  </div>
</section>
